version: "3.9"

services:
  backend:
    container_name: traderpulse-api
    build:
      context: ./backend
      target: dev
    environment:
      ENVIRONMENT: development
      FRONTEND_URL: http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-replace-with-real-key}
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    container_name: traderpulse-web
    build:
      context: ./frontend
      target: dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
